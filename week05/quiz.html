<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Along</title>
    <link rel="stylesheet" href="styles/quiz.css">
    <meta name="description" content="A quiz about some small fetures of html and css">
    <meta name="author" content="Jared Lee">
</head>
<body>
    <header>

    </header>
    <main>
        <h1>Html Quiz</h1>
        <form>
            <div class="quiz">
                <label for="q1">How would you set the text color to white using css?</label>
                <input type="text" id="q1" name="q1" required>
            
                <label for="q2">Give a valid example of a div with class of "class" containing a text element.</label>
                <textarea rows="4" cols="30" id="q2" name="q2" required></textarea>
            
                <label for="q3">What does HTML stand for?</label>
                <select name="q3" id="q3" required>
                    <option value="" selected disabled>Choose One</option>
                    <option value="hotmail">Hotmail</option>
                    <option value="hex">Hexidecimal Text Manipulation Language</option>
                    <option value="hyper">Hypertext Markup Language</option>
                    <option value="hewlett">Hewlett-Packer Terminal Machine Language</option>
                </select>
            
                <label for="q4">In css, how many pixels is one em usually?</label>
                <input type="number" id="q4" name="q4" required>
            
                <button type="submit">Submit</button>
            </div>
        </form>
    </main>
    <footer>

    </footer>
</body>
</html>
