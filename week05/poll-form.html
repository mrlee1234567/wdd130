<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poll Form</title>
    <link rel="stylesheet" href="styles/poll-form.css">
</head>
<body>
    <main>
        <form>
            <div class="form-item column2">
                <label for="fullname">Full Name</label>
                <input type="text" id="fullname" name="fullname" required>
            </div>

            <div class="form-item column2">
                <label for="email">Eamil</label>
                <input type="email" id="email" name="email" required>
            </div>

            <label for="browser">Favoriutse</label>
            <select name="browser" id="browser">
                <option value="chrome">Chrome</option>
                <option value="safari">Chrome but Apple</option>
                <option value="firefox">Firefox</option>
                <option value="edge">Chrome but Microsoft</option>
                <option value="opera">Chrome but Gamer</option>
                <option value="brave">Chrome but Lions</option>
                <option value="other">Some other Chrome flavoure</option>
            </select>

            <div class="form-item column1">
                <label for="pet">Do you have a pet?</label>
                <input type="checkbox" id="pet" name="pet">
            </div>

            <label for="feedback">Where have you lived?</label>
            <textarea id="feedback" name="feedback" placeholder="goose island" rows="4"></textarea>

            <button type="submit">SUBMIT</button>
        </form>
    </main>
</body>
</html>
